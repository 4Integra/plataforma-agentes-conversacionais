server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: memory-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/memory_service}
    username: ${SPRING_DATASOURCE_USERNAME:memory}
    password: ${SPRING_DATASOURCE_PASSWORD:memory}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

memory:
  max-page-size: ${MEMORY_MAX_PAGE_SIZE:200}
  short-term:
    enabled: ${MEMORY_SHORT_TERM_ENABLED:true}
    max-messages: ${MEMORY_SHORT_TERM_MAX_MESSAGES:50}
    ttl: ${MEMORY_SHORT_TERM_TTL:PT12H}
    key-prefix: ${MEMORY_SHORT_TERM_KEY_PREFIX:memory:conversation:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

